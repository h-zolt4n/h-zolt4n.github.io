    <style>
    body {
        margin: 0;

        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        background-color: #d5f6ff;

        border: 3px solid #6ead89;

    }

    .titlepage h1 {

    .content-box {
        width: 600px; 
        padding: 20px;          
        background-color: #e7f9ff; 
        border: 3px solid #3990b5; 
        border-radius: 10px;
        color: #3990b5;  
        box-sizing: border-box;

    .content-box p { margin: 0px; }

    /* Sidebar Layout */
    .sidebar {
        display: flex;
        flex-direction: column;
        gap: 0px; 
    }

    .nav-title {
        width: 180px;
        padding: 0px 0px;
        border: 3px solid #6ead89;
        background-color: #e4ffda;
        border-radius: 10px 10px 0 0;
        color: #6ead89;    
        box-sizing: border-box;
        text-align: center;
        font-weight: 700;
    }
    .nav-title p {
        margin: 5px 0;
    }

    .nav-links {
        width: 180px;
        padding: 10px;
        border: 3px solid #6ead89;
        border-radius: 0 0 10px 10px;

        border-top: none; 
        box-sizing: border-box;
        margin-bottom: 15px; /

    .nav-links p { margin: 5px 0; font-size: 0.95rem; }

    .linktitle {
        width: 180px;
        padding: 8px 10px;
        border: 3px solid #746799;
        background-color: #f0edf7;
        border-radius: 10px 10px 0 0;
        color: #51417e;    
        box-sizing: border-box;
        text-align: center;
    }

    .links {
        width: 180px;
        padding: 10px;
        border: 3px solid #746799;
        border-radius: 0 0 10px 10px; 
        background-color: #f0edf7;
        border-top: none; 
        box-sizing: border-box;
    }

    .links p { margin: 5px 0; font-size: 0.95rem; }
    .linktitle p { margin: 0; font-weight: 700; font-size: 1rem; }

    /* mobile */
    @media (max-width: 800px) {
        .container { flex-direction: column; align-items: center; }
        .titlepage, .content-box { width: 95%; }
        .sidebar { width: 95%; align-items: center; }
        .nav-title, .nav-links, .linktitle, .links { width: 100%; }
    }
