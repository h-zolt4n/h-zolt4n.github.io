<!DOCTYPE html>
<html>
<head>
    <title>My GitHub Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
    body {
        background-image: url("https://i.imgur.com/phzayBp.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        margin: 0;
        font-family: 'Libertinus Serif', serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    a {
        color: #5ab4ed; 
        text-decoration: none;  
    }

    .titlepage {
        width: 100%;
        max-width: 770px;
        padding: 20px;          
        background-color: #e7f9ff; 
        border: 3px solid #3990b5; 
        border-radius: 10px;
        color: #3990b5;  
        margin-bottom: 15px;
        box-sizing: border-box;
        font-size: 1vw;
    }

     .titlepage h1, .titlepage p {
       margin: 0; 
       padding: 2px 0; 
       font-weight: 700; 
       font-style: italic; 
    }
    
    .content-box h1{
        margin:0;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px; 
        justify-content: center;
        align-items: flex-start;
        width: 100%;
    }

    .content-box {
        width: 600px; 
        padding: 20px;          
        background-color: #e7f9ff; 
        border: 3px solid #3990b5; 
        border-radius: 10px;
        color: #3990b5;  
        box-sizing: border-box;
    }

    .sidebar {
        /* flex: 1 removed */
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .linktitle {
        width: 160px;
        padding: 5px 10px;
        border: 3px solid #51417e;
        background-color: #f0edf7;
        border-radius: 10px 10px 0 0;
        color: #51417e;    
        box-sizing: border-box;
    }

    .links {
        width: 160px;
        padding: 10px;
        border: 3px solid #51417e;
        border-radius: 0 0 10px 10px; 
        background-color: #f0edf7;
        margin-top: -14px;
        box-sizing: border-box;
        font-size: 0.8vw;
    }

    .linktitle p, .links p, .content-box p, .titlepage p {
        margin: 3px 0;
    }

    @media (max-width: 800px) {
        .container {
            flex-direction: column;
            align-items: center;
        }
        .titlepage, .content-box {
            width: 95%;
        }
    }
    </style>
</head>
<body>

    <div class="titlepage">
         <h1>h-zolt4n</h1>
    </div>

    <div class="container">
        <div class="content-box">
            <h1>About Me</h1>
            <p>I just put random stuff here sometimes...</p>
        </div>

        <div class="sidebar">
            <div class="linktitle">
                <p>links idk</p>
            </div>
            <div class="links">
                <p><a href="https://www.instagram.com/zolt4n_24/" target="_blank">❖ instagram</a></p>
                <p><a href="https://artofproblemsolving.com" target="_blank">❖ mathlinks.ro</a></p>
            </div>
        </div>
    </div>

</body>
</html>
